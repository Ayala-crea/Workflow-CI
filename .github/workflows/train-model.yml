name: Train ML model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check environment
        shell: bash
        run: |
          echo "=== Check Python environment ==="
          python --version
          pip --version

          echo "=== Check working directory ==="
          pwd

          echo "=== Check repository files ==="
          ls -la

          echo "=== Check MLProject folder ==="
          ls -la MLProject

          echo "=== Check required MLProject files ==="
          test -f MLProject/MLproject
          test -f MLProject/conda.yaml
          test -f MLProject/preprocessing_eda.py
          test -f MLProject/modelling.py

          echo "=== Check dataset preprocessing folder if exists ==="
          if [ -d MLProject/dataset_preprocessing ]; then
            ls -la MLProject/dataset_preprocessing
          else
            echo "MLProject/dataset_preprocessing not found yet. It may be generated by preprocessing_eda.py"
          fi

      - name: Install MLflow and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.15.1 pandas==2.2.2 numpy==1.26.4 scikit-learn==1.5.1 matplotlib==3.9.1 joblib==1.4.2

      - name: Check installed dependencies
        shell: bash
        run: |
          python - <<'PY'
          import sys
          import mlflow
          import pandas
          import numpy
          import sklearn
          import matplotlib
          import joblib

          print("Python:", sys.version)
          print("MLflow:", mlflow.__version__)
          print("Pandas:", pandas.__version__)
          print("NumPy:", numpy.__version__)
          print("Scikit-learn:", sklearn.__version__)
          print("Matplotlib:", matplotlib.__version__)
          print("Joblib:", joblib.__version__)
          PY

      - name: Retrain model with MLflow Project
        shell: bash
        run: |
          echo "Running model retraining using MLflow Project"
          mlflow run MLProject -e main --env-manager=local

      - name: Check output files
        if: always()
        shell: bash
        run: |
          echo "=== Check generated files after retraining ==="
          pwd
          echo "=== Root files ==="
          ls -la

          echo "=== MLProject files ==="
          ls -la MLProject || true

          echo "=== MLruns files ==="
          ls -la mlruns || true

          echo "=== Model files ==="
          ls -la model || true
          ls -la MLProject/model || true

      - name: Upload MLflow runs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: |
            mlruns/
            MLProject/mlruns/
          if-no-files-found: warn

      - name: Upload trained model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model/
            MLProject/model/
          if-no-files-found: warn